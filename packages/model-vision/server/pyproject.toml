[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sketchapedia-model-vision"
version = "0.0.0"
description = "Vision grounding service: corrects hitmap coordinates against a rendered keyframe."
requires-python = ">=3.11,<3.12"
license = { text = "Apache-2.0" }

dependencies = [
  "fastapi==0.115.6",
  "uvicorn[standard]==0.32.1",
  "sse-starlette==2.1.3",
  "pydantic==2.10.3",
  "pydantic-settings==2.7.0",
  "httpx==0.28.1",
  "pillow==11.0.0",
  "numpy==2.1.3",
  "scipy==1.14.1",
  "rapidfuzz==3.10.1",
  "structlog==24.4.0",
  "torch==2.4.1",
  "torchvision==0.19.1",
  "transformers==4.46.3",
  "accelerate==1.1.1",
  "timm==1.0.11",
  "einops==0.8.0",
  "safetensors==0.4.5",
  "opencv-python-headless==4.10.0.84"
]

[project.optional-dependencies]
dev = [
  "pytest==8.3.4",
  "pytest-asyncio==0.25.0",
  "pytest-timeout==2.3.1",
  "httpx==0.28.1",
  "ruff==0.8.3",
  "mypy==1.13.0"
]

[project.scripts]
model-vision-server = "model_vision.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
  "gpu: requires CUDA GPU and downloaded weights",
  "integration: requires running server with models loaded"
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "RUF"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
