# Local stack for the e2e suite. Brings up the full server side in containers.
# Model services are NOT in here — they're hosted Modal endpoints; the cache-
# server and orchestrator are configured via env to reach them with the real
# API key. See stack/.env.example for every variable the suite expects.
#
# `pnpm --filter @sketchapedia/tests-e2e stack:up` uses `--wait` to block until
# every service reports healthy, so the test runner never races a cold gateway.

name: sketchapedia-e2e

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  redis:
    image: redis:7.4-alpine
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 2s
      retries: 15
    ports:
      - '${E2E_REDIS_PORT:-6379}:6379'
    logging: *default-logging

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sketchapedia}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sketchapedia-dev-secret}
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:9000/minio/health/ready']
      interval: 3s
      timeout: 2s
      retries: 20
    ports:
      - '${E2E_MINIO_PORT:-9000}:9000'
      - '${E2E_MINIO_CONSOLE_PORT:-9001}:9001'
    logging: *default-logging

  # Content-addressed server cache. Depends on Redis + MinIO for indices and blobs.
  cache-server:
    image: ${E2E_CACHE_SERVER_IMAGE:-ghcr.io/sketchapedia/cache-server:main}
    environment:
      PORT: '8090'
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-sketchapedia}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-sketchapedia-dev-secret}
      S3_BUCKET: sketchapedia-artifacts
      ADMIN_TOKEN: ${E2E_CACHE_ADMIN_TOKEN:-e2e-admin}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://collector:4318
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8090/healthz']
      interval: 3s
      timeout: 2s
      retries: 20
    ports:
      - '${E2E_CACHE_PORT:-8090}:8090'
    logging: *default-logging

  # Orchestrator — talks to Modal-hosted models. Requires a dedicated test-workspace API key.
  orchestrator:
    image: ${E2E_ORCHESTRATOR_IMAGE:-ghcr.io/sketchapedia/orchestrator:main}
    environment:
      PORT: '8070'
      REDIS_URL: redis://redis:6379/1
      CACHE_SERVER_URL: http://cache-server:8090
      MODAL_API_KEY: ${MODAL_API_KEY:?MODAL_API_KEY must be set for the test workspace}
      MODAL_WORKSPACE: ${MODAL_WORKSPACE:-sketchapedia-test}
      IMAGE_MODEL_ENDPOINT: ${IMAGE_MODEL_ENDPOINT:?must be set}
      LAYOUT_MODEL_ENDPOINT: ${LAYOUT_MODEL_ENDPOINT:?must be set}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://collector:4318
    depends_on:
      cache-server: { condition: service_healthy }
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8070/healthz']
      interval: 3s
      timeout: 2s
      retries: 30
    ports:
      - '${E2E_ORCHESTRATOR_PORT:-8070}:8070'
    logging: *default-logging

  # WebSocket gateway — client-facing.
  gateway:
    image: ${E2E_GATEWAY_IMAGE:-ghcr.io/sketchapedia/gateway:main}
    environment:
      GATEWAY_PORT: '8080'
      REDIS_URL: redis://redis:6379/2
      ORCHESTRATOR_URL: http://orchestrator:8070
      JWT_PUBLIC_KEY: ${E2E_JWT_PUBLIC_KEY_PEM:?must be set}
      JWT_ISSUER: ${E2E_JWT_ISSUER:-sketchapedia-test}
      JWT_AUDIENCE: ${E2E_JWT_AUDIENCE:-sketchapedia-gateway}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://collector:4318
    depends_on:
      orchestrator: { condition: service_healthy }
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/healthz']
      interval: 3s
      timeout: 2s
      retries: 30
    ports:
      - '${E2E_GATEWAY_PORT:-8080}:8080'
    logging: *default-logging

  # OpenTelemetry collector — captures traces/logs for failed-test uploads.
  collector:
    image: otel/opentelemetry-collector-contrib:0.117.0
    command: ['--config=/etc/otel/config.yaml']
    volumes:
      - ./otel-collector.yaml:/etc/otel/config.yaml:ro
      - ./.collector-output:/var/log/otel
    ports:
      - '${E2E_COLLECTOR_HTTP_PORT:-4318}:4318'
      - '${E2E_COLLECTOR_GRPC_PORT:-4317}:4317'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:13133/']
      interval: 3s
      timeout: 2s
      retries: 15
    logging: *default-logging

volumes:
  minio-data: {}
